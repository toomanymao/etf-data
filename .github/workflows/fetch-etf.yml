name: Fetch ETF Flows

on:
  schedule:
    - cron: '0 9 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-etf-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch ETF flows from SoSoValue
        env:
          SOSO_KEY: ${{ secrets.SOSOVALUE_API_KEY }}
        run: |
          node fetch-etf.js

      - name: Commit and push updated data
        run: |
          git config user.name "ETF Bot"
          git config user.email "bot@mrmpodcast.com"
          git add etf-flows.json
          git diff --staged --quiet || git commit -m "Update ETF flows $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
