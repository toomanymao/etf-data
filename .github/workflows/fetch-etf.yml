name: Fetch ETF Flows

on:
  schedule:
    - cron: '0 5 * * 1-5'   # 09:00 UAE (UTC+4) — morning fetch
    - cron: '0 10 * * 1-5'  # 14:00 UAE (UTC+4) — afternoon fetch
    - cron: '0 15 * * 1-5'  # 19:00 UAE (UTC+4) — evening fetch (catches US market close data)
    - cron: '0 19 * * 1-5'  # 23:00 UAE (UTC+4) — late night fetch (catches Farside/SoSoValue publish)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-etf-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch ETF flows from SoSoValue
        env:
          SOSO_KEY: ${{ secrets.SOSOVALUE_API_KEY }}
        run: |
          node fetch-etf.js

      - name: Commit and push updated data
        run: |
          git config user.name "ETF Bot"
          git config user.email "bot@mrmpodcast.com"
          git add etf-flows.json
          git diff --staged --quiet || git commit -m "Update ETF flows $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
