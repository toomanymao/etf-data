name: Fetch ETF Flows

on:
  schedule:
    # Runs at 09:00 UTC every weekday (Mon-Fri)
    # Farside/SoSoValue publish previous day's data by ~08:30 UTC
    - cron: '0 9 * * 1-5'
    # Second run at 14:00 UTC as backup
    - cron: '0 14 * * 1-5'
  # Also allows you to trigger manually from GitHub → Actions tab → Run workflow
  workflow_dispatch:

jobs:
  fetch-etf-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch ETF flows from SoSoValue
        env:
          SOSO_KEY: ${{ secrets.SOSOVALUE_API_KEY }}
        run: |
          node fetch-etf.js

      - name: Commit and push updated data
        run: |
          git config user.name "ETF Bot"
          git config user.email "bot@mrmpodcast.com"
          git add etf-flows.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "Update ETF flows $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
